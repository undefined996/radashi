name: Benchmark Pull Request Comment

on:
  workflow_run:
    workflows: ['Benchmark Pull Request']
    types: [completed]

permissions:
  actions: read
  contents: read

jobs:
  comment:
    name: Comment Benchmark Results
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.pull_requests[0].number != null }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4

      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment benchmark results
        env:
          RADASHI_BOT_TOKEN: ${{ secrets.RADASHI_BOT_TOKEN }}
        run: |
          node scripts/run bench-pr comment ${{ github.event.workflow_run.pull_requests[0].number }} benchmark-results/comment.md
